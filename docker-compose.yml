version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    depends_on:
      - mongodb
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  celery-default:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO --queues=default,email
    env_file: .env
    depends_on:
      - api
      - redis
    restart: unless-stopped

  celery-ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO --queues=ai,resume
    env_file: .env
    depends_on:
      - api
      - redis
    restart: unless-stopped

  celery-job:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO --queues=job,application
    env_file: .env
    depends_on:
      - api
      - redis
    restart: unless-stopped

  celery-automation:
    build:
      context: .
      dockerfile: docker/Dockerfile.playwright
    env_file: .env
    depends_on:
      - api
      - redis
    restart: unless-stopped
    shm_size: "1gb"

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.core.celery_app.celery_app beat --loglevel=INFO
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped

  mongodb:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chromadata:/chroma/chroma
    ports:
      - "8001:8000"
    restart: unless-stopped

volumes:
  mongodata:
  miniodata:
  chromadata:
